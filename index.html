<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>麻雀アシスタント</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;700;900&family=Zen+Antique&display=swap');

:root {
  --green: #1a4a2e;
  --green-light: #2d6e47;
  --green-felt: #1e5c38;
  --gold: #c8a84b;
  --ivory: #f5f0e8;
  --panel-bg: rgba(10,30,20,0.9);
  --text-light: #e8e0d0;
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family: 'Noto Serif JP', serif;
  background: var(--green);
  color: var(--text-light);
  min-height: 100vh;
  overflow-x: hidden;
}

body::before {
  content:'';
  position:fixed; inset:0;
  background-image:
    repeating-linear-gradient(45deg,transparent,transparent 2px,rgba(0,0,0,0.03) 2px,rgba(0,0,0,0.03) 4px),
    repeating-linear-gradient(-45deg,transparent,transparent 2px,rgba(0,0,0,0.03) 2px,rgba(0,0,0,0.03) 4px);
  pointer-events:none; z-index:0;
}

/* ===== LAYOUT SELECTOR (startup screen) ===== */
#layoutSelector {
  position:fixed; inset:0; z-index:1000;
  background: radial-gradient(ellipse at center, #1e5c38 0%, #0d2518 100%);
  display:flex; align-items:center; justify-content:center;
  flex-direction:column; gap:32px;
}

.ls-title {
  font-family:'Zen Antique',serif;
  font-size:2.5rem; color:var(--gold);
  text-shadow:0 0 40px rgba(200,168,75,0.7);
  letter-spacing:0.2em; text-align:center;
}

.ls-subtitle {
  font-size:0.9rem; color:rgba(232,224,208,0.6);
  letter-spacing:0.1em; text-align:center;
}

.ls-options {
  display:flex; gap:24px; flex-wrap:wrap; justify-content:center;
}

.ls-btn {
  width:160px; padding:28px 20px;
  background:rgba(0,0,0,0.3);
  border:2px solid rgba(200,168,75,0.4);
  border-radius:12px; cursor:pointer;
  display:flex; flex-direction:column; align-items:center; gap:12px;
  transition:all 0.25s; color:var(--text-light);
}

.ls-btn:hover {
  border-color:var(--gold);
  background:rgba(200,168,75,0.1);
  transform:translateY(-4px);
  box-shadow:0 8px 30px rgba(0,0,0,0.4);
}

.ls-btn-icon { font-size:3rem; }
.ls-btn-label { font-family:'Zen Antique',serif; font-size:1rem; color:var(--gold); }
.ls-btn-desc { font-size:0.72rem; color:rgba(232,224,208,0.5); text-align:center; }

/* ===== HEADER ===== */
header {
  background:linear-gradient(180deg,rgba(0,0,0,0.6) 0%,transparent 100%);
  padding:10px 14px;
  display:flex; align-items:center; justify-content:space-between;
  position:relative; z-index:10;
  border-bottom:1px solid rgba(200,168,75,0.3);
  gap:8px;
}

.header-left {
  display:flex; align-items:center; gap:10px;
}

.logo {
  font-family:'Zen Antique',serif;
  font-size:1.4rem; color:var(--gold);
  text-shadow:0 0 20px rgba(200,168,75,0.5);
  letter-spacing:0.05em; white-space:nowrap;
}

/* Search button (always visible top-left area) */
.search-fab {
  width:38px; height:38px;
  background:rgba(0,0,0,0.4);
  border:1px solid rgba(200,168,75,0.5);
  border-radius:50%; cursor:pointer;
  display:flex; align-items:center; justify-content:center;
  font-size:1.1rem; color:var(--gold);
  transition:all 0.2s; flex-shrink:0;
  user-select:none;
}

.search-fab:hover, .search-fab.active {
  background:var(--gold); color:var(--green);
  box-shadow:0 0 16px rgba(200,168,75,0.5);
}

.search-fab.active { animation:pulse-gold 1.5s infinite; }

@keyframes pulse-gold {
  0%,100%{box-shadow:0 0 8px rgba(200,168,75,0.5);}
  50%{box-shadow:0 0 20px rgba(200,168,75,0.9);}
}

.header-right {
  display:flex; align-items:center; gap:8px;
}

.btn {
  padding:6px 12px;
  border:1px solid var(--gold);
  background:transparent; color:var(--gold);
  font-family:'Noto Serif JP',serif;
  font-size:0.78rem; cursor:pointer;
  transition:all 0.2s; border-radius:3px; white-space:nowrap;
}
.btn:hover { background:var(--gold); color:var(--green); }
.btn.active { background:var(--gold); color:var(--green); font-weight:700; }
.btn-red { border-color:#e74c3c; color:#e74c3c; }
.btn-red:hover { background:#e74c3c; color:white; }
.btn-icon {
  width:36px; height:36px; padding:0;
  border:1px solid rgba(200,168,75,0.5);
  background:rgba(0,0,0,0.3);
  border-radius:4px; font-size:1rem;
  display:flex; align-items:center; justify-content:center;
}
.btn-icon:hover { background:var(--gold); color:var(--green); }

select {
  padding:5px 8px;
  background:rgba(0,0,0,0.5);
  border:1px solid var(--gold); color:var(--gold);
  font-family:'Noto Serif JP',serif; font-size:0.78rem;
  border-radius:3px; cursor:pointer;
}

/* ===== SETTINGS PANEL ===== */
#settingsPanel {
  position:fixed; top:60px; right:14px; z-index:90;
  background:#0d2518;
  border:1px solid var(--gold);
  border-radius:10px; width:280px;
  box-shadow:0 8px 40px rgba(0,0,0,0.7);
  animation:slideIn 0.2s ease-out;
  overflow:hidden;
}

@keyframes slideIn {
  from { opacity:0; transform:translateY(-10px); }
  to { opacity:1; transform:translateY(0); }
}

.settings-header {
  padding:12px 16px;
  background:rgba(200,168,75,0.1);
  border-bottom:1px solid rgba(200,168,75,0.2);
  font-size:0.85rem; color:var(--gold);
  letter-spacing:0.1em;
  display:flex; justify-content:space-between; align-items:center;
}

.settings-body { padding:14px 16px; display:flex; flex-direction:column; gap:14px; }

.settings-group { display:flex; flex-direction:column; gap:8px; }

.settings-label {
  font-size:0.7rem; color:rgba(200,168,75,0.6);
  letter-spacing:0.15em; text-transform:uppercase;
}

.settings-row {
  display:flex; gap:6px; flex-wrap:wrap;
}

.settings-select { width:100%; }

.settings-divider {
  height:1px; background:rgba(200,168,75,0.15); margin:2px 0;
}

/* ===== SEARCH MODE OVERLAY ===== */
#searchModeOverlay {
  position:fixed; inset:0; z-index:500;
  cursor:text;
  /* Subtle tint to indicate search mode */
  background:rgba(200,168,75,0.04);
  pointer-events:none;
}

#searchModeOverlay.active {
  pointer-events:all;
}

.search-mode-banner {
  position:fixed; top:60px; left:50%; transform:translateX(-50%);
  background:rgba(200,168,75,0.95); color:#0d2518;
  padding:8px 20px; border-radius:20px;
  font-size:0.82rem; font-weight:700;
  box-shadow:0 4px 20px rgba(0,0,0,0.4);
  white-space:nowrap; letter-spacing:0.05em;
  animation:slideDown 0.3s ease-out;
  z-index:501; pointer-events:none;
}

@keyframes slideDown {
  from{transform:translateX(-50%) translateY(-10px);opacity:0;}
  to{transform:translateX(-50%) translateY(0);opacity:1;}
}

/* ===== SEARCH RESULT PANEL ===== */
#searchPanel {
  position:fixed; bottom:0; left:0; right:0;
  max-height:55vh; z-index:600;
  background:#0d2518;
  border-top:2px solid var(--gold);
  border-radius:16px 16px 0 0;
  display:flex; flex-direction:column;
  box-shadow:0 -8px 40px rgba(0,0,0,0.7);
  animation:slideUp 0.3s ease-out;
  overflow:hidden;
}

@keyframes slideUp {
  from{transform:translateY(100%);}
  to{transform:translateY(0);}
}

.sp-handle {
  width:40px; height:4px;
  background:rgba(200,168,75,0.4);
  border-radius:2px; margin:10px auto 4px;
  flex-shrink:0;
}

.sp-header {
  padding:8px 16px 12px;
  display:flex; align-items:center; gap:10px; flex-shrink:0;
  border-bottom:1px solid rgba(200,168,75,0.2);
}

.sp-query {
  flex:1; font-size:1rem; font-weight:700;
  color:var(--gold); font-family:'Zen Antique',serif;
}

.sp-close {
  background:none; border:1px solid rgba(200,168,75,0.4);
  color:var(--gold); width:28px; height:28px;
  border-radius:50%; cursor:pointer; font-size:1rem;
  display:flex; align-items:center; justify-content:center;
}
.sp-close:hover { background:var(--gold); color:var(--green); }

.sp-body {
  flex:1; overflow-y:auto; padding:14px 16px;
}

.sp-body::-webkit-scrollbar{width:4px;}
.sp-body::-webkit-scrollbar-thumb{background:rgba(200,168,75,0.3);border-radius:2px;}

.sp-definition {
  font-size:0.9rem; line-height:1.8;
  color:var(--text-light); margin-bottom:16px;
}

.sp-definition strong { color:var(--gold); }

.sp-reading {
  font-size:0.75rem; color:rgba(200,168,75,0.6);
  margin-bottom:8px; letter-spacing:0.1em;
}

.sp-notfound {
  font-size:0.85rem; color:rgba(232,224,208,0.5); margin-bottom:16px;
}

.sp-web-section {
  display:flex; flex-direction:column; gap:8px;
  padding-top:12px; border-top:1px solid rgba(200,168,75,0.15);
}

.sp-web-label {
  font-size:0.7rem; color:rgba(200,168,75,0.5); letter-spacing:0.1em;
}

.sp-web-btns { display:flex; gap:8px; flex-wrap:wrap; }

.sp-web-btn {
  padding:7px 14px;
  border:1px solid rgba(200,168,75,0.4);
  background:transparent; color:rgba(200,168,75,0.8);
  font-family:'Noto Serif JP',serif; font-size:0.78rem;
  border-radius:4px; cursor:pointer; transition:all 0.2s;
  text-decoration:none; display:inline-block;
}
.sp-web-btn:hover { background:rgba(200,168,75,0.15); color:var(--gold); }

/* ===== MAIN LAYOUT ===== */
.main {
  display:grid;
  grid-template-columns:1fr 300px;
  gap:12px; padding:12px;
  position:relative; z-index:1;
  min-height:calc(100vh - 62px);
}

/* MOBILE LAYOUT */
body.layout-mobile .main {
  grid-template-columns:1fr;
  padding:8px;
  gap:8px;
}

body.layout-mobile .side-panel {
  display:none; /* hidden by default, toggled via bottom tabs */
}

body.layout-mobile .side-panel.mobile-visible {
  display:flex;
}

/* Mobile tab bar */
.mobile-tab-bar {
  display:none;
  position:sticky; bottom:0; z-index:20;
  background:#0a1e10;
  border-top:1px solid rgba(200,168,75,0.3);
  padding:6px 0;
}

body.layout-mobile .mobile-tab-bar { display:flex; }

.mob-tab {
  flex:1; display:flex; flex-direction:column;
  align-items:center; gap:3px;
  padding:6px; cursor:pointer;
  font-size:0.65rem; color:rgba(200,168,75,0.4);
  border:none; background:transparent;
  transition:color 0.15s;
}
.mob-tab.active { color:var(--gold); }
.mob-tab-icon { font-size:1.3rem; }

/* ===== GAME AREA ===== */
.game-area { display:flex; flex-direction:column; gap:10px; }

/* ===== TABLE ===== */
.table {
  background:var(--green-felt, #1e5c38);
  border-radius:12px;
  border:2px solid rgba(200,168,75,0.3);
  padding:12px;
  box-shadow:inset 0 0 60px rgba(0,0,0,0.3);
  position:relative; overflow:hidden;
}

.table::before {
  content:''; position:absolute; inset:8px;
  border:1px solid rgba(200,168,75,0.12);
  border-radius:8px; pointer-events:none;
}

/* CPU zone */
.cpu-zone {
  display:grid;
  grid-template-areas:". top ." "left . right" ". . .";
  grid-template-columns:1fr 1fr 1fr;
  gap:5px; margin-bottom:8px;
}

.cpu-top{grid-area:top;}
.cpu-left{grid-area:left;}
.cpu-right{grid-area:right;}

.cpu-player {
  background:rgba(0,0,0,0.3);
  border-radius:6px; padding:7px;
  display:flex; flex-direction:column; align-items:center; gap:4px;
  border:1px solid rgba(200,168,75,0.2);
  min-width:0;
}

.cpu-name { font-size:0.72rem; color:var(--gold); }
.cpu-score { font-size:0.75rem; color:var(--ivory); }

.cpu-tiles { display:flex; gap:2px; flex-wrap:wrap; justify-content:center; }

.cpu-tile-back {
  width:16px; height:22px;
  background:url('tiles/Regular/Back.png') center/cover no-repeat;
  border-radius:2px;
}

/* mobile: smaller CPU tiles */
body.layout-mobile .cpu-tile-back { width:12px; height:17px; }

.discard-tiles { display:flex; flex-wrap:wrap; gap:2px; }

/* Center */
.table-center {
  display:flex; justify-content:center; align-items:center;
  padding:6px 0; gap:16px;
}

.wind-kanji {
  font-family:'Zen Antique',serif;
  font-size:2rem; color:var(--gold);
  text-shadow:0 0 15px rgba(200,168,75,0.6);
}

.wind-label, .yama-label, .dora-label {
  font-size:0.6rem; color:rgba(200,168,75,0.6); margin-top:2px; text-align:center;
}

.yama-count {
  font-size:1.6rem; font-weight:900; color:var(--ivory); line-height:1; text-align:center;
}

.round-display {
  font-family:'Zen Antique',serif;
  font-size:0.85rem; color:rgba(200,168,75,0.8);
  letter-spacing:0.1em; text-align:center;
}

.honba-display { font-size:0.65rem; color:rgba(232,224,208,0.5); text-align:center; }

/* ===== TILES ===== */
.tile {
  display:inline-block;
  background-color:#faf6ee;
  background-size:100% 100%;
  background-repeat:no-repeat;
  border:1px solid #c8b89a; border-radius:3px;
  box-shadow:2px 2px 0px rgba(0,0,0,0.3);
  cursor:pointer; transition:transform 0.15s, box-shadow 0.15s;
  position:relative; user-select:none; vertical-align:bottom;
}

.tile:hover { transform:translateY(-4px); }
.tile.selected { transform:translateY(-8px); border-color:var(--gold); }
.tile.tsumo { border-color:#5dade2; margin-left:8px; box-shadow:2px 2px 0 rgba(0,0,0,0.3), 0 0 8px rgba(93,173,226,0.5); }
.tile.candidate-best { border-color:#2ecc71; box-shadow:2px 2px 0 rgba(0,0,0,0.3), 0 0 10px rgba(46,204,113,0.7); }

.tile-lg { width:42px; height:58px; }
.tile-md { width:32px; height:44px; }
.tile-sm { width:22px; height:30px; }
.tile-xs { width:16px; height:22px; }

/* Mobile tile sizes */
body.layout-mobile .tile-lg { width:34px; height:48px; }
body.layout-mobile .tile-md { width:26px; height:36px; }

.man{color:#c0392b;} .pin{color:#1a5276;} .sou{color:#1e8449;}
.jihai{color:#2c3e50;} .haku{color:#2c3e50;font-weight:900;}
.hatsu{color:#1e8449;font-weight:900;} .chun{color:#c0392b;font-weight:900;}

/* Wind badge */
.wind-badge {
  background:var(--gold); color:var(--green);
  font-size:0.65rem; padding:2px 5px;
  border-radius:2px; font-weight:700;
}

.riichi-indicator {
  display:inline-block; background:#e74c3c; color:white;
  font-size:0.6rem; padding:1px 5px; border-radius:2px; font-weight:700;
}

.tenpai-badge {
  display:inline-block;
  background:rgba(46,204,113,0.15);
  border:1px solid #2ecc71; color:#2ecc71;
  font-size:0.65rem; padding:1px 6px; border-radius:2px; font-weight:700;
  animation:pulse 1.5s infinite;
}

@keyframes pulse { 0%,100%{opacity:1;} 50%{opacity:0.5;} }

/* Player zone */
.player-zone { margin-top:8px; }

.player-info {
  display:flex; justify-content:space-between; align-items:center;
  margin-bottom:6px; padding:0 4px;
  flex-wrap:wrap; gap:4px;
}

.player-name-display {
  font-size:0.82rem; color:var(--gold);
  display:flex; align-items:center; gap:6px; flex-wrap:wrap;
}

.player-score-display {
  font-size:0.95rem; color:var(--ivory); font-weight:700;
}

.hand-container {
  display:flex; align-items:flex-end; gap:3px; flex-wrap:wrap;
}

.discard-zone {
  background:rgba(0,0,0,0.2); border-radius:5px;
  padding:6px; margin-top:6px;
}

.discard-label {
  font-size:0.6rem; color:rgba(232,224,208,0.5); margin-bottom:4px;
}

/* ===== ACTION BAR ===== */
.action-bar {
  display:flex; gap:6px; justify-content:center;
  padding:8px; background:rgba(0,0,0,0.3);
  border-radius:8px; flex-wrap:wrap;
}

.action-btn {
  padding:9px 16px; border:2px solid;
  background:transparent;
  font-family:'Noto Serif JP',serif;
  font-size:0.95rem; font-weight:700;
  cursor:pointer; border-radius:4px;
  transition:all 0.2s; letter-spacing:0.05em;
}

body.layout-mobile .action-btn {
  padding:10px 12px; font-size:0.85rem; flex:1; min-width:60px;
}

.action-tsumo{border-color:#5dade2;color:#5dade2;}
.action-tsumo:hover{background:#5dade2;color:#0a1a2e;}
.action-ron{border-color:#e74c3c;color:#e74c3c;}
.action-ron:hover{background:#e74c3c;color:white;}
.action-chi{border-color:#f39c12;color:#f39c12;}
.action-chi:hover{background:#f39c12;color:#1a1a1a;}
.action-pon{border-color:#9b59b6;color:#9b59b6;}
.action-pon:hover{background:#9b59b6;color:white;}
.action-kan{border-color:#1abc9c;color:#1abc9c;}
.action-kan:hover{background:#1abc9c;color:white;}
.action-riichi{border-color:var(--gold);color:var(--gold);}
.action-riichi:hover{background:var(--gold);color:var(--green);}
.action-skip{border-color:rgba(232,224,208,0.4);color:rgba(232,224,208,0.4);}
.action-skip:hover{background:rgba(232,224,208,0.1);}
.action-btn:disabled{opacity:0.2;cursor:not-allowed;pointer-events:none;}

/* Status */
.status-msg {
  text-align:center; font-size:0.82rem;
  color:rgba(232,224,208,0.7); padding:5px; min-height:26px;
}

/* ===== SIDE PANEL ===== */
.side-panel { display:flex; flex-direction:column; gap:10px; }

.panel {
  background:var(--panel-bg);
  border:1px solid rgba(200,168,75,0.25);
  border-radius:8px; overflow:hidden;
  backdrop-filter:blur(4px);
}

.panel-header {
  padding:7px 14px;
  background:rgba(200,168,75,0.1);
  border-bottom:1px solid rgba(200,168,75,0.2);
  font-size:0.78rem; color:var(--gold);
  letter-spacing:0.1em;
  display:flex; justify-content:space-between; align-items:center;
}

.panel-body { padding:10px; }

.score-row {
  display:flex; justify-content:space-between; align-items:center;
  padding:4px 0; border-bottom:1px solid rgba(255,255,255,0.05);
  font-size:0.82rem;
}
.score-row:last-child{border-bottom:none;}
.score-name { color:rgba(232,224,208,0.7); display:flex; align-items:center; gap:6px; }

/* Candidates */
.candidate-list { display:flex; flex-direction:column; gap:5px; }

.candidate-item {
  background:rgba(255,255,255,0.05);
  border:1px solid rgba(255,255,255,0.1);
  border-radius:4px; padding:7px 9px;
  cursor:pointer; transition:all 0.2s;
  display:flex; align-items:center; gap:7px;
}
.candidate-item:hover { background:rgba(255,255,255,0.1); border-color:var(--gold); }
.candidate-item.best { border-color:#2ecc71; background:rgba(46,204,113,0.05); }
.candidate-rank { font-size:0.65rem; color:rgba(232,224,208,0.4); min-width:18px; }
.candidate-rank.best { color:#2ecc71; }
.candidate-info { flex:1; font-size:0.72rem; }
.candidate-shanten { color:var(--gold); font-weight:700; }
.candidate-yaku { color:rgba(232,224,208,0.6); margin-top:2px; }
.candidate-detail-btn {
  font-size:0.62rem; padding:3px 6px;
  border:1px solid rgba(200,168,75,0.4);
  background:transparent; color:rgba(200,168,75,0.7);
  cursor:pointer; border-radius:2px; transition:all 0.15s;
}
.candidate-detail-btn:hover { background:rgba(200,168,75,0.15); color:var(--gold); }
.candidate-discard-btn {
  font-size:0.62rem; padding:3px 8px;
  border:1px solid rgba(46,204,113,0.5);
  background:rgba(46,204,113,0.08); color:rgba(46,204,113,0.9);
  cursor:pointer; border-radius:2px; transition:all 0.15s; white-space:nowrap;
}
.candidate-discard-btn:hover { background:rgba(46,204,113,0.25); color:#2ecc71; }

/* Wait analysis */
.wait-analysis { display:flex; flex-direction:column; gap:8px; }
.wait-analysis-item {
  background:rgba(255,255,255,0.04);
  border:1px solid rgba(255,255,255,0.08);
  border-radius:6px; padding:8px 10px;
}
.wait-analysis-header { display:flex; align-items:center; gap:8px; margin-bottom:5px; }
.wait-analysis-score { flex:1; }
.wait-han-label { font-size:0.75rem; color:var(--gold); font-weight:700; }
.wait-pts { font-size:0.75rem; color:#2ecc71; margin-left:8px; }
.wait-no-yaku { font-size:0.72rem; color:rgba(232,224,208,0.4); margin-left:8px; }
.wait-yaku-list { display:flex; flex-wrap:wrap; gap:4px; margin-bottom:6px; }
.wait-yaku-tag {
  font-size:0.62rem; padding:2px 5px;
  background:rgba(200,168,75,0.15);
  border:1px solid rgba(200,168,75,0.3);
  border-radius:2px; color:rgba(200,168,75,0.9);
}
.decomp-display { display:flex; flex-wrap:wrap; gap:6px; margin-top:4px; }
.decomp-group { display:flex; flex-direction:column; align-items:center; gap:2px; }
.decomp-group-label { font-size:0.58rem; color:rgba(232,224,208,0.4); }
.decomp-tiles { display:flex; gap:1px; }

/* Log */
.log-list {
  max-height:110px; overflow-y:auto;
  font-size:0.7rem; display:flex; flex-direction:column; gap:2px;
}
.log-list::-webkit-scrollbar{width:3px;}
.log-list::-webkit-scrollbar-thumb{background:rgba(200,168,75,0.3);border-radius:1px;}
.log-item{padding:2px 5px;border-radius:2px;color:rgba(232,224,208,0.7);line-height:1.4;}
.log-item.system{color:var(--gold);}
.log-item.win{color:#2ecc71;font-weight:700;}
.log-item.riichi{color:#9b59b6;}

/* ===== MODAL ===== */
.modal-overlay {
  position:fixed; inset:0;
  background:rgba(0,0,0,0.8); z-index:300;
  display:flex; align-items:center; justify-content:center;
  padding:16px; backdrop-filter:blur(4px);
}

.modal {
  background:#0d2518;
  border:1px solid var(--gold);
  border-radius:10px;
  max-width:680px; width:100%;
  max-height:88vh; overflow-y:auto;
  box-shadow:0 20px 60px rgba(0,0,0,0.8);
}
.modal::-webkit-scrollbar{width:5px;}
.modal::-webkit-scrollbar-thumb{background:rgba(200,168,75,0.3);border-radius:2px;}

.modal-header {
  padding:14px 18px;
  border-bottom:1px solid rgba(200,168,75,0.3);
  display:flex; justify-content:space-between; align-items:center;
  position:sticky; top:0; background:#0d2518; z-index:1;
}

.modal-title { font-family:'Zen Antique',serif; font-size:1.1rem; color:var(--gold); }

.modal-close {
  background:none; border:1px solid rgba(200,168,75,0.4);
  color:var(--gold); font-size:1.1rem; cursor:pointer;
  width:28px; height:28px; border-radius:50%;
  display:flex; align-items:center; justify-content:center;
  transition:all 0.2s;
}
.modal-close:hover{background:var(--gold);color:var(--green);}
.modal-body{padding:18px;}

/* Yaku list */
.yaku-category{margin-bottom:18px;}
.yaku-cat-title{
  font-size:0.72rem;color:rgba(200,168,75,0.6);
  letter-spacing:0.15em;margin-bottom:8px;
  padding-bottom:5px;border-bottom:1px solid rgba(200,168,75,0.2);
}
.yaku-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(185px,1fr));gap:7px;}
.yaku-card{
  background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);
  border-radius:5px;padding:9px;transition:all 0.2s;cursor:pointer;
}
.yaku-card:hover{background:rgba(200,168,75,0.08);border-color:rgba(200,168,75,0.3);}
.yaku-name{font-size:0.88rem;color:var(--ivory);margin-bottom:3px;}
.yaku-han{font-size:0.68rem;color:var(--gold);margin-bottom:5px;}
.yaku-desc{font-size:0.7rem;color:rgba(232,224,208,0.6);line-height:1.5;}

/* Result */
.result-display{text-align:center;padding:16px;}
.result-type{
  font-family:'Zen Antique',serif; font-size:2.8rem;
  color:var(--gold); text-shadow:0 0 30px rgba(200,168,75,0.8);
  margin-bottom:14px; animation:glow 0.5s ease-out;
}
@keyframes glow{from{transform:scale(0.8);opacity:0;}to{transform:scale(1);opacity:1;}}
.result-hand-display{display:flex;gap:3px;justify-content:center;flex-wrap:wrap;margin-bottom:16px;}
.result-yaku-list{display:flex;flex-direction:column;gap:5px;margin-bottom:16px;text-align:left;}
.result-yaku-item{
  display:flex;justify-content:space-between;
  padding:5px 9px;background:rgba(255,255,255,0.05);border-radius:4px;
}
.result-total{font-size:1.4rem;font-weight:900;color:#2ecc71;margin:8px 0;}
.result-fu{font-size:0.82rem;color:rgba(232,224,208,0.6);margin-bottom:16px;}

/* Detail */
.detail-section{margin-bottom:14px;}
.detail-title{font-size:0.72rem;color:rgba(200,168,75,0.6);letter-spacing:0.1em;margin-bottom:7px;}
.hand-example{
  display:flex;gap:3px;flex-wrap:wrap;align-items:center;
  background:rgba(255,255,255,0.03);padding:9px;border-radius:4px;
}

/* Notification */
.notification{
  position:fixed; top:72px; left:50%; transform:translateX(-50%);
  background:rgba(10,30,20,0.96);border:1px solid var(--gold);
  padding:10px 22px; border-radius:6px; font-size:0.87rem;
  color:var(--ivory); z-index:400; animation:notifSlide 0.3s ease-out;
  box-shadow:0 4px 20px rgba(0,0,0,0.5); text-align:center; white-space:nowrap;
}
@keyframes notifSlide{from{transform:translateX(-50%) translateY(-15px);opacity:0;}to{transform:translateX(-50%) translateY(0);opacity:1;}}

/* Save/restore indicator */
.save-indicator{
  position:fixed; bottom:60px; right:14px; z-index:50;
  font-size:0.68rem; color:rgba(200,168,75,0.4);
  pointer-events:none; transition:opacity 0.5s;
}

.hidden{display:none!important;}

/* Selection highlight when in search mode */
body.search-mode *::selection {
  background:rgba(200,168,75,0.5);
  color:var(--green);
}

/* Snap highlight on search mode click */
.search-highlight {
  outline:2px solid var(--gold);
  outline-offset:2px;
  border-radius:3px;
  animation:searchPulse 0.4s ease-out;
}

@keyframes searchPulse {
  from{outline-color:rgba(200,168,75,1); transform:scale(1.05);}
  to{outline-color:rgba(200,168,75,0.6); transform:scale(1);}
}
</style>

<script>
// ============================================================
// MAHJONG GLOSSARY
// ============================================================
const GLOSSARY = {
  // 基本用語
  '東家': { read:'とんちゃ / とんや', def:'場の中で最初の親（親番）。東の風牌が自風になる。東1局の最初のプレイヤーが東家となる。' },
  '南家': { read:'なんちゃ', def:'東家の下家（次の人）。南の風牌が自風になる。' },
  '西家': { read:'しゃーちゃ', def:'東家の対面（向かいの人）から見て右隣。西の風牌が自風。' },
  '北家': { read:'ぺーちゃ', def:'東家の上家（左隣）。北の風牌が自風。' },
  '親': { read:'おや', def:'その局で最初にツモる特権プレイヤー。アガリで連荘（同じ局を続けられる）。ツモアガリ・放銃時の点数が多くなる。' },
  '子': { read:'こ', def:'親以外の3人。点数の支払いは親の半額。' },
  '場': { read:'ば', def:'現在の局がどの風かを示す。東場は東1〜4局、南場は南1〜4局。' },
  'ツモ': { read:'つも', def:'山牌から1枚牌を引くこと。またはツモアガリ（自分で引いた牌でアガること）。' },
  'ロン': { read:'ろん', def:'他プレイヤーが捨てた牌でアガること。放銃した人が全額払う。' },
  '捨て牌': { read:'すてはい', def:'不要な牌を自分の捨て場に出すこと。捨てた牌の順番が記録され、他プレイヤーの待ちを推測する情報になる。' },
  '山牌': { read:'やまはい', def:'まだ誰にも配られていない残り牌の山。ここからツモる。' },
  '手牌': { read:'てはい', def:'自分が持っている13枚（ツモ後は14枚）の牌。' },
  '配牌': { read:'はいはい', def:'ゲーム開始時に配られる13枚の牌。' },
  'アガリ': { read:'あがり', def:'14枚の手牌を特定の形（面子4つ＋雀頭1つ等）に完成させること。役が必要。' },
  '役': { read:'やく', def:'アガリに必要な手の形のルール。役がないとアガれない。各役には翻数があり、得点に直結する。' },
  '翻': { read:'はん', def:'役の強さを示す単位。翻数が多いほど得点が高い。符と組み合わせて得点計算する。' },
  '符': { read:'ふ', def:'得点計算の基礎単位。30符や40符など。翻数とセットで基本点を計算する。' },
  'シャンテン': { read:'しゃんてん', def:'あと何枚でテンパイになるかを示す数。0シャンテン=テンパイ。-1=アガリ形。数値が小さいほどアガリに近い。' },
  'テンパイ': { read:'てんぱい', def:'あと1枚でアガれる状態（0シャンテン）。この状態でリーチ宣言が可能。' },
  'リーチ': { read:'りーち', def:'テンパイ時に1000点を供託して宣言する役。宣言後は手牌を変えられない（ツモ切り強制）。裏ドラが乗る可能性あり。' },
  '面子': { read:'めんつ', def:'3枚で1組を作る基本単位。刻子（同じ牌3枚）か順子（連続する3枚）。アガリには面子4つ＋雀頭1つが必要（通常形）。' },
  '刻子': { read:'こーつ', def:'同じ牌を3枚揃えた面子。例：東東東、白白白。' },
  '順子': { read:'しゅんつ', def:'同じ種類で連続する数牌3枚の面子。例：１２３m、⑤⑥⑦。' },
  '雀頭': { read:'じゃんとう', def:'アガリに必要な2枚一組の対子（おとも牌とも呼ぶ）。役の制約になる場合がある（平和の雀頭は役牌不可など）。' },
  '対子': { read:'とーつ', def:'同じ牌2枚の組み合わせ。雀頭またはチートイツの素材。' },
  '塔子': { read:'たーつ', def:'面子になりそうな2枚の組み合わせ。両面（リャンメン）・嵌張（カンチャン）・辺張（ペンチャン）の3種。' },
  '両面': { read:'りゃんめん', def:'23のような連続2枚の塔子。1・4または両端の2種類の牌でアガれる。最も有利な待ち。' },
  '嵌張': { read:'かんちゃん', def:'13のような2枚の塔子。2のみでアガれる1種待ち。' },
  '辺張': { read:'ぺんちゃん', def:'12または89のような端の塔子。3か7のみでアガれる1種待ち。' },
  'ドラ': { read:'どら', def:'アガリ時に翻が1翻加算されるボーナス牌。表示牌の次の牌がドラ。役はないので単独ではアガれない。' },
  '裏ドラ': { read:'うらどら', def:'リーチ成功時のみ開く追加ドラ。アガリ時に1枚につき1翻加算。' },
  'カンドラ': { read:'かんどら', def:'カン（4枚使い）した後に追加されるドラ表示牌。' },
  'カン': { read:'かん', def:'同じ牌4枚を使って特殊な面子（槓子）を作る宣言。追加ツモができ、カンドラが増える。' },
  'ポン': { read:'ぽん', def:'他プレイヤーの捨て牌を使って刻子を作る宣言。鳴き（副露）の一種。門前でなくなる。' },

// SEARCH MODE
// ============================================================
let searchModeActive = false;
let searchPanelOpen = false;

function toggleSearchMode() {
  searchModeActive = !searchModeActive;
  const fab = document.getElementById('searchFab');
  const overlay = document.getElementById('searchModeOverlay');
  const banner = document.getElementById('searchBanner');

  if (searchModeActive) {
    fab.classList.add('active');
    overlay.classList.add('active');
    document.body.classList.add('search-mode');
    // Show banner
    if (!document.getElementById('searchBanner')) {
      const b = document.createElement('div');
      b.id = 'searchBanner';
      b.className = 'search-mode-banner';
      b.textContent = '🔍 検索モード：調べたい文字をタップ／クリック';
      document.body.appendChild(b);
    }
  } else {
    fab.classList.remove('active');
    overlay.classList.remove('active');
    document.body.classList.remove('search-mode');
    const b = document.getElementById('searchBanner');
    if (b) b.remove();
  }
}

function handleSearchClick(e) {
  if (!searchModeActive) return;
  e.preventDefault(); e.stopPropagation();

  // Get the element under pointer (behind overlay)
  overlay.style.pointerEvents = 'none';
  const el = document.elementFromPoint(e.clientX, e.clientY);
  overlay.style.pointerEvents = '';

  if (!el) return;

  // Flash highlight
  el.classList.add('search-highlight');
  setTimeout(() => el.classList.remove('search-highlight'), 600);

  // Get text to search
  let text = '';

  // Check if there's a window selection first
  const sel = window.getSelection();
  if (sel && sel.toString().trim().length > 0) {
    text = sel.toString().trim();
    sel.removeAllRanges();
  } else {
    // Use element's text content
    text = (el.textContent || el.innerText || '').trim();
    // Limit to meaningful length
    if (text.length > 20) text = text.slice(0, 10);
  }

  if (text) {
    searchTerm(text);
    // Disable search mode after finding
    toggleSearchMode();
  }
}

function searchTerm(query) {
  if (!query) return;
  query = query.trim();

  document.getElementById('spQuery').textContent = '「' + query + '」';
  document.getElementById('searchPanel').classList.remove('hidden');
  searchPanelOpen = true;

  const body = document.getElementById('spBody');

  // Look up in glossary
  let found = null;
  // Exact match first
  if (GLOSSARY[query]) {
    found = { term: query, ...GLOSSARY[query] };
  } else {
    // Partial match
    for (const [k, v] of Object.entries(GLOSSARY)) {
      if (k.includes(query) || query.includes(k) || (v.read && v.read.includes(query))) {
        found = { term: k, ...v };
        break;
      }
    }
  }

  const encodedGoogle = encodeURIComponent('麻雀 ' + query);
  const encodedWiki = encodeURIComponent('麻雀 ' + query);

  const webSection = `
    <div class="sp-web-section">
      <div class="sp-web-label">外部サイトで詳しく調べる</div>
      <div class="sp-web-btns">
        <a class="sp-web-btn" href="https://www.google.com/search?q=${encodedGoogle}" target="_blank" onclick="saveGameState()">🔎 Google検索</a>
        <a class="sp-web-btn" href="https://ja.wikipedia.org/wiki/Special:Search?search=${encodedWiki}" target="_blank" onclick="saveGameState()">📚 Wikipedia</a>
        <a class="sp-web-btn" href="https://mahjong.guide/a-quick-guide-to-mahjong/" target="_blank" onclick="saveGameState()">🃏 麻雀ガイド</a>
      </div>
      <div style="font-size:0.68rem;color:rgba(232,224,208,0.4);margin-top:8px;">※ 外部ページに移動してもゲームの進行は自動保存されます</div>
    </div>
  `;

  if (found) {
    body.innerHTML = `
      <div class="sp-reading">${found.read ? '読み方：' + found.read : ''}</div>
      <div class="sp-definition">${found.def}</div>
      ${webSection}
    `;
  } else {
    body.innerHTML = `
      <div class="sp-notfound">「${query}」の用語説明が見つかりませんでした。</div>
      <div style="font-size:0.8rem;color:rgba(232,224,208,0.5);margin-bottom:16px;">以下のサイトで検索することができます：</div>
      ${webSection}
    `;
  }
}

  document.getElementById('searchPanel').classList.add('hidden');
  searchPanelOpen = false;
}

function selectLayout(type) {

  // Show main UI
  document.getElementById('layoutSelector').classList.add('hidden');

  document.getElementById('s-mob').classList.toggle('active', type === 'mobile');

  try { localStorage.setItem('mahjong_layout', type); } catch(e) {}

  } else {

// GAME STATE SAVE / RESTORE
// ============================================================
function saveGameState() {
  if (!G) return;
  try {
    const state = {
      G: JSON.stringify(G),
      gameType,
      layout: currentLayout,
      ts: Date.now()
    };
    localStorage.setItem('mahjong_save', JSON.stringify(state));
    const ind = document.getElementById('saveIndicator');
    ind.style.opacity = '1';
    setTimeout(() => { ind.style.opacity = '0'; }, 2000);
  } catch(e) {}
}

function loadGameState() {
  try {
    const raw = localStorage.getItem('mahjong_save');
    if (!raw) return false;
    const state = JSON.parse(raw);
    // Only restore if saved within 24h
    if (Date.now() - state.ts > 86400000) return false;
    G = JSON.parse(state.G);
    gameType = state.layout ? (state.gameType || 4) : 4;
    return state.layout || 'desktop';
  } catch(e) {
    return false;
  }
}

// Auto-save every 5 seconds during game
setInterval(() => { if (G && !G.gameOver) saveGameState(); }, 5000);

// ============================================================
// TILE DEFINITIONS
// ============================================================
const TILE_DISPLAY = {
  man: (n) => ({ text: n + 'm', color: 'man' }),
  pin: (n) => ({ text: n + 'p', color: 'pin' }),
  sou: (n) => ({ text: n + 's', color: 'sou' }),
  jihai: (n) => {
    const chars = ['東','南','西','北','白','発','中'];
    const colors = ['jihai','jihai','jihai','jihai','haku','hatsu','chun'];
    return { text: chars[n-1], color: colors[n-1] };
  }
};

let gameType = 4;

function createTile(suit, num, id) { return { suit, num, id }; }

function tileDisplay(tile) {
  if (tile.suit === 'jihai') return TILE_DISPLAY.jihai(tile.num);
  return TILE_DISPLAY[tile.suit](tile.num);
}

function getTileImagePath(tile, folder='Regular') {
  if (tile.suit === 'jihai') {
    const names = ['Ton','Nan','Shaa','Pei','Haku','Hatsu','Chun'];
    return `tiles/${folder}/${names[tile.num-1]}.png`;
  }
  const suit = tile.suit.charAt(0).toUpperCase() + tile.suit.slice(1);
  return `tiles/${folder}/${suit}${tile.num}.png`;
}

function tileStyle(tile) {
  const src = getTileImagePath(tile);
  return `background-image:url('${src}'),url('tiles/Regular/Front.png');background-size:100% 100%,100% 100%;background-repeat:no-repeat,no-repeat;`;
}

function tileKey(t) { return t.suit + t.num; }

function createTileset() {
  const tiles = []; let id = 0;
  const suits = gameType === 4 ? ['man','pin','sou'] : ['pin','sou'];
  for (const suit of suits) {
    for (let num = 1; num <= 9; num++)
      for (let k = 0; k < 4; k++) tiles.push(createTile(suit, num, id++));
  }
  if (gameType === 3) {
    for (const num of [1,9])
      for (let k = 0; k < 4; k++) tiles.push(createTile('man', num, id++));
  }
  for (let num = 1; num <= 7; num++)
    for (let k = 0; k < 4; k++) tiles.push(createTile('jihai', num, id++));
  return tiles;
}

function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

// ============================================================
// GAME STATE
// ============================================================
let G = null;

function initGame() {
  const playerCount = gameType === 4 ? 4 : 3;
  const tileset = shuffle(createTileset());
  const players = [];
  for (let i = 0; i < playerCount; i++) {
    players.push({
      hand: [], discards: [], melds: [],
      score: 25000, riichi: false, riichiTurn: -1,
      isPlayer: i === 0,
      name: i === 0 ? 'あなた' : ['対面','上家','下家'][i-1],
      wind: null
    });
  }
  const dora = tileset.splice(0, 1)[0];
  const yama = tileset.splice(0, tileset.length);
  for (let i = 0; i < playerCount; i++) players[i].hand = yama.splice(0, 13);

  G = {
    players, yama, dora: [dora], kanDora: [],
    round: 1, honba: 0, riichiPot: 0,
    currentTurn: 0, phase: 'draw',
    tsumoTile: null, pendingAction: null,
    gameOver: false, turnCount: 0, playerCount
  };

  assignWinds();
  drawTile(0);
  G.phase = 'player_draw';
}

function assignWinds() {
  const roundWinds = ['東','南','西','北'];
  const winds = ['東','南','西','北'];
  G.players.forEach((p, i) => { p.wind = winds[i % G.playerCount]; });
  const ri = Math.floor((G.round - 1) / G.playerCount);
  G.roundWindName = roundWinds[ri] || '東';
}

function drawTile(playerIdx) {
  if (G.yama.length === 0) { handleRyuukyoku(); return; }
  const tile = G.yama.shift();
  if (playerIdx === 0) { G.tsumoTile = tile; }
  else { G.players[playerIdx].hand.push(tile); }
  G.turnCount++;
}

function getPlayerHand(playerIdx) {
  const p = G.players[playerIdx];
  if (playerIdx === 0 && G.tsumoTile) return [...p.hand, G.tsumoTile];
  return [...p.hand];
}

// ============================================================
// SHANTEN
// ============================================================
function sortTiles(tiles) {
  return [...tiles].sort((a, b) => {
    const s = { man:0, pin:1, sou:2, jihai:3 };
    if (a.suit !== b.suit) return s[a.suit] - s[b.suit];
    return a.num - b.num;
  });
}

function countTiles(tiles) {
  const c = {};
  for (const t of tiles) { const k = tileKey(t); c[k] = (c[k]||0)+1; }
  return c;
}

function calcShanten(tiles) {
  if (tiles.length === 0) return 8;
  const sorted = sortTiles(tiles);
  return Math.min(calcNormalShanten(sorted), calcChiitoiShanten(sorted), calcKokushiShanten(sorted));
}

function calcNormalShanten(tiles) {
  let minShanten = 8;
  const tryPair = (pairSuit, pairNum) => {
    let remaining = [...tiles];
    if (pairSuit !== null) {
      let removed = 0;
      remaining = remaining.filter(t => {
        if (removed < 2 && t.suit === pairSuit && t.num === pairNum) { removed++; return false; }
        return true;
      });
      if (removed < 2) return;
    }
    const { mentsu, taatsu } = greedyExtract(remaining);
    const pairs = pairSuit !== null ? 1 : 0;
    const needed = 4;
    const have_taatsu = Math.min(taatsu, needed - mentsu);
    const shanten = (needed - mentsu) * 2 - have_taatsu - pairs - 1;
    minShanten = Math.min(minShanten, Math.max(-1, shanten));
  };
  tryPair(null, null);
  for (const t of tiles) tryPair(t.suit, t.num);
  return minShanten;
}

function greedyExtract(tiles) {
  const byGroup = { man:[], pin:[], sou:[], jihai:[] };
  for (const t of tiles) byGroup[t.suit].push(t.num);
  Object.keys(byGroup).forEach(k => byGroup[k].sort((a,b)=>a-b));
  let mentsu = 0, taatsu = 0;
  for (const suit of ['man','pin','sou','jihai']) {
    const nums = [...byGroup[suit]];
    for (let i = nums.length - 1; i >= 2; i--) {
      if (nums[i] === nums[i-1] && nums[i] === nums[i-2]) { mentsu++; nums.splice(i-2,3); i -= 2; }
    }
    if (suit !== 'jihai') {
      let changed = true;
      while (changed) {
        changed = false;
        for (let n = 1; n <= 7; n++) {
          const i1 = nums.indexOf(n), i2 = nums.indexOf(n+1), i3 = nums.indexOf(n+2);
          if (i1 >= 0 && i2 >= 0 && i3 >= 0) {
            mentsu++;
            [i1,i2,i3].sort((a,b)=>b-a).forEach(i=>nums.splice(i,1));
            changed = true; break;
          }
        }
      }
      for (let i = 0; i < nums.length - 1; i++) {
        if (nums[i+1] - nums[i] <= 2) { taatsu++; nums.splice(i,2); i--; }
        else if (nums[i+1] === nums[i]) { taatsu++; nums.splice(i,2); i--; }
      }
    } else {
      for (let i = 0; i < nums.length - 1; i++) {
        if (nums[i+1] === nums[i]) { taatsu++; nums.splice(i,2); i--; }
      }
    }
  }
  return { mentsu, taatsu };
}

function calcChiitoiShanten(tiles) {
  const counts = countTiles(tiles);
  const pairs = Object.values(counts).filter(c => c >= 2).length;
  return 6 - pairs;
}

function calcKokushiShanten(tiles) {
  const terminals = ['man1','man9','pin1','pin9','sou1','sou9','jihai1','jihai2','jihai3','jihai4','jihai5','jihai6','jihai7'];
  const tileKeys = new Set(tiles.map(tileKey));
  let unique = 0, pair = false;
  for (const t of terminals) {
    if (tileKeys.has(t)) { unique++; if ((countTiles(tiles)[t]||0) >= 2) pair = true; }
  }
  return 13 - unique - (pair ? 1 : 0);
}

// ============================================================
// AGARI CHECK
// ============================================================
function checkAgari(tiles) {
  const sorted = sortTiles(tiles);
  if (sorted.length !== 14) return null;
  if (isChiitoitsu(sorted)) return { valid:true, type:'chiitoitsu' };
  if (isKokushi(sorted)) return { valid:true, type:'kokushi' };
  if (isNormalAgari(sorted)) return { valid:true, type:'normal' };
  return null;
}

function isChiitoitsu(tiles) {
  const counts = countTiles(tiles);
  const vals = Object.values(counts);
  return vals.length === 7 && vals.every(c => c === 2);
}

function isKokushi(tiles) {
  const terminals = ['man1','man9','pin1','pin9','sou1','sou9','jihai1','jihai2','jihai3','jihai4','jihai5','jihai6','jihai7'];
  const counts = countTiles(tiles);
  const hasPair = terminals.some(t => (counts[t]||0) >= 2);
  const hasAll = terminals.every(t => (counts[t]||0) >= 1);
  return hasAll && hasPair;
}

function isNormalAgari(tiles) {
  for (const t of tiles) {
    const remaining = [...tiles];
    let removed = 0;
    const withoutPair = remaining.filter(x => {
      if (removed < 2 && tileKey(x) === tileKey(t)) { removed++; return false; }
      return true;
    });
    if (removed === 2 && canFormMentsu(withoutPair)) return true;
  }
  return false;
}

function canFormMentsu(tiles) {
  if (tiles.length === 0) return true;
  const sorted = sortTiles(tiles);
  const t = sorted[0];
  if (sorted.filter(x => tileKey(x) === tileKey(t)).length >= 3) {
    let count = 0;
    const rest = sorted.filter(x => { if (count < 3 && tileKey(x) === tileKey(t)) { count++; return false; } return true; });
    if (canFormMentsu(rest)) return true;
  }
  if (t.suit !== 'jihai' && t.num <= 7) {
    const n1 = sorted.findIndex(x => tileKey(x) === tileKey(t));
    const n2 = sorted.findIndex(x => x.suit === t.suit && x.num === t.num + 1);
    const n3 = sorted.findIndex(x => x.suit === t.suit && x.num === t.num + 2);
    if (n1 >= 0 && n2 >= 0 && n3 >= 0) {
      const rest = sorted.filter((_, i) => i !== n1 && i !== n2 && i !== n3);
      if (canFormMentsu(rest)) return true;
    }
  }
  return false;
}

// ============================================================
// YAKU DETECTION
// ============================================================
function detectYaku(tiles, playerState, context) {
  const yaku = [];
  const { riichi, tsumo, seat_wind, round_wind, melds } = context;
  const isClosed = (melds || []).length === 0;

  if (riichi) yaku.push({ name:'リーチ', han:1 });
  if (tsumo && isClosed) yaku.push({ name:'門前清自摸和', han:1 });

  const hasTerminal = tiles.some(t => t.suit === 'jihai' || t.num === 1 || t.num === 9);
  if (!hasTerminal) yaku.push({ name:'断幺九', han:1 });

  if (isClosed && isPinfuCheck(tiles, round_wind, seat_wind)) yaku.push({ name:'平和', han:1 });

  yaku.push(...checkYakuhai(tiles, seat_wind, round_wind));

  if (isChiitoitsu(sortTiles(tiles))) yaku.push({ name:'七対子', han:2 });

  const suits = new Set(tiles.filter(t => t.suit !== 'jihai').map(t => t.suit));
  const hasJihai = tiles.some(t => t.suit === 'jihai');
  if (suits.size === 1) {
    if (!hasJihai) yaku.push({ name:'清一色', han: isClosed ? 6 : 5 });
    else yaku.push({ name:'混一色', han: isClosed ? 3 : 2 });
  }

  if (isSanshokuDoujun(tiles)) yaku.push({ name:'三色同順', han: isClosed ? 2 : 1 });
  if (isSanshokuDoukou(tiles)) yaku.push({ name:'三色同刻', han:2 });
  if (isIttsu(tiles)) yaku.push({ name:'一気通貫', han: isClosed ? 2 : 1 });
  if (isKokushi(sortTiles(tiles))) yaku.push({ name:'国士無双', han:13 });
  if (tiles.every(t => t.suit === 'jihai')) yaku.push({ name:'字一色', han:13 });
  if (isRyuuiisou(tiles)) yaku.push({ name:'緑一色', han:13 });
  if (tiles.every(t => t.suit !== 'jihai' && (t.num === 1 || t.num === 9))) yaku.push({ name:'清老頭', han:13 });

  return yaku;
}

function isPinfuCheck(tiles, round_wind, seat_wind) {
  const counts = countTiles(tiles);
  const pair_key = Object.keys(counts).find(k => counts[k] === 2);
  if (!pair_key) return false;
  if (pair_key.startsWith('jihai')) {
    const num = parseInt(pair_key.replace('jihai',''));
    if (num >= 5) return false;
    const windNums = {'東':1,'南':2,'西':3,'北':4};
    if (num === windNums[round_wind] || num === windNums[seat_wind]) return false;
  }
  return true;
}

function checkYakuhai(tiles, seat_wind, round_wind) {
  const yaku = []; const counts = countTiles(tiles);
  const windMap = {'東':1,'南':2,'西':3,'北':4};
  if ((counts['jihai5']||0) >= 3) yaku.push({ name:'白', han:1 });
  if ((counts['jihai6']||0) >= 3) yaku.push({ name:'発', han:1 });
  if ((counts['jihai7']||0) >= 3) yaku.push({ name:'中', han:1 });
  const sw = windMap[seat_wind];
  if (sw && (counts[`jihai${sw}`]||0) >= 3) yaku.push({ name:`${seat_wind}(門風)`, han:1 });
  const rw = windMap[round_wind];
  if (rw && rw !== sw && (counts[`jihai${rw}`]||0) >= 3) yaku.push({ name:`${round_wind}(場風)`, han:1 });
  return yaku;
}

function isSanshokuDoujun(tiles) {
  const seqs = { man:new Set(), pin:new Set(), sou:new Set() };
  const sorted = sortTiles(tiles);
  for (const suit of ['man','pin','sou']) {
    const nums = sorted.filter(t=>t.suit===suit).map(t=>t.num).sort((a,b)=>a-b);
    for (let i = 0; i <= nums.length-3; i++) {
      if (nums[i+1]===nums[i]+1 && nums[i+2]===nums[i]+2) seqs[suit].add(nums[i]);
    }
  }
  for (const n of seqs.man) { if (seqs.pin.has(n) && seqs.sou.has(n)) return true; }
  return false;
}

function isSanshokuDoukou(tiles) {
  const counts = {};
  for (const t of tiles) {
    if (t.suit==='jihai') continue;
    if (!counts[t.num]) counts[t.num]={man:0,pin:0,sou:0};
    counts[t.num][t.suit]=(counts[t.num][t.suit]||0)+1;
  }
  return Object.values(counts).some(c=>c.man>=3&&c.pin>=3&&c.sou>=3);
}

function isIttsu(tiles) {
  for (const suit of ['man','pin','sou']) {
    const nums = new Set(tiles.filter(t=>t.suit===suit).map(t=>t.num));
    if ([1,2,3,4,5,6,7,8,9].every(n=>nums.has(n))) return true;
  }
  return false;
}

function isRyuuiisou(tiles) {
  const green = new Set(['sou2','sou3','sou4','sou6','sou8','jihai6']);
  return tiles.every(t=>green.has(tileKey(t)));
}

// ============================================================
// SCORE CALCULATION
// ============================================================
function calcScore(yaku, fu, han) {
  const totalHan = yaku.reduce((s,y)=>s+y.han,0);
  if (yaku.some(y=>y.han>=13)) return { basicPoints:8000, totalHan:13, fu:30, yakuman:true };
  if (totalHan >= 13) return { basicPoints:8000, totalHan, fu, yakuman:true };
  if (totalHan >= 5) {
    const tbl = totalHan>=13?8000:totalHan>=11?6000:totalHan>=8?4000:totalHan>=6?3000:2000;
    return { basicPoints:tbl, totalHan, fu, mangan:true };
  }
  return { basicPoints: Math.min(fu * Math.pow(2, totalHan+2), 8000), totalHan, fu };
}

function calcFu(tiles, context) {
  if (isChiitoitsu(sortTiles(tiles))) return 25;
  if (isKokushi(sortTiles(tiles))) return 30;
  return context.tsumo && !context.riichi ? 20 : 30;
}

// ============================================================
// CANDIDATES
// ============================================================
function analyzeCandidates(playerIdx) {
  const hand = G.players[playerIdx].hand;
  const tsumo = G.tsumoTile;
  const fullHand = tsumo ? [...hand, tsumo] : [...hand];
  const candidates = []; const seen = new Set();
  for (const tile of fullHand) {
    const key = tileKey(tile);
    if (seen.has(key)) continue; seen.add(key);
    let removed = false;
    const remaining = fullHand.filter(t => { if (!removed && t.id===tile.id) { removed=true; return false; } return true; });
    const shanten = calcShanten(remaining);
    const context = getPlayerContext(playerIdx);
    const yaku = shanten === -1 ? detectYaku(remaining, G.players[playerIdx], context) : [];
    candidates.push({ tile, shanten, yaku, display: tileDisplay(tile) });
  }
  candidates.sort((a,b) => a.shanten-b.shanten || a.tile.suit.localeCompare(b.tile.suit) || a.tile.num-b.tile.num);
  return candidates.slice(0, 6);
}

function getPlayerContext(playerIdx) {
  const p = G.players[playerIdx];
  return { riichi:p.riichi, tsumo:false, seat_wind:p.wind, round_wind:G.roundWindName, melds:p.melds };
}

// ============================================================
// CPU AI
// ============================================================
function cpuTurn(playerIdx) {
  const algo = document.getElementById('cpuAlgo').value;
  const p = G.players[playerIdx];
  setTimeout(() => {
    if (G.gameOver) return;
    let discardIdx;
    if (algo === 'random') discardIdx = p.hand.length - 1;
    else if (algo === 'defense') discardIdx = findSafestDiscard(playerIdx);
    else discardIdx = findBestDiscard(playerIdx);

    const discardTile = p.hand[discardIdx];
    p.hand.splice(discardIdx, 1);
    p.discards.push(discardTile);
    addLog(`${p.name}が ${renderTileText(discardTile)} を捨てた`, 'cpu');

    G.currentTurn = (G.currentTurn + 1) % G.playerCount;
    if (G.currentTurn === 0) {
      drawTile(0);
      G.phase = 'player_draw';
      updateUI();
    } else {
      drawTile(G.currentTurn);
      const cpuHand = getPlayerHand(G.currentTurn);
      if (cpuHand.length === 14 && checkAgari(cpuHand) && Math.random() < 0.05) {
        handleCpuWin(G.currentTurn, cpuHand, 'tsumo'); return;
      }
      cpuTurn(G.currentTurn);
    }
  }, 500);
}

function findBestDiscard(playerIdx) {
  const p = G.players[playerIdx];
  let bestIdx = 0, bestShanten = Infinity;
  for (let i = 0; i < p.hand.length; i++) {
    const sh = calcShanten(p.hand.filter((_,j)=>j!==i));
    if (sh < bestShanten) { bestShanten = sh; bestIdx = i; }
  }
  return bestIdx;
}

function findSafestDiscard(playerIdx) {
  const safeKeys = new Set();
  G.players.forEach((p, i) => { if (i!==playerIdx) p.discards.forEach(t=>safeKeys.add(tileKey(t))); });
  const p = G.players[playerIdx];
  for (let i = 0; i < p.hand.length; i++) { if (safeKeys.has(tileKey(p.hand[i]))) return i; }
  return findBestDiscard(playerIdx);
}

function handleCpuWin(playerIdx, hand, type) {
  const p = G.players[playerIdx];
  const context = getPlayerContext(playerIdx);
  context.tsumo = type === 'tsumo';
  const yaku = detectYaku(hand, p, context);
  if (yaku.length === 0) return;
  const han = yaku.reduce((s,y)=>s+y.han,0);
  const fu = calcFu(hand, context);
  const { basicPoints } = calcScore(yaku, fu, han);
  const pts = basicPoints * (type==='tsumo' ? 2 : 4);
  p.score += pts;
  G.players[0].score -= Math.floor(pts/3);
  G.gameOver = true;
  addLog(`${p.name}が${type==='tsumo'?'ツモ':'ロン'}! ${han}翻`, 'win');
  updateUI();
  showNotification(`${p.name}が${type==='tsumo'?'ツモ':'ロン'}アガリ！`);
  saveGameState();
}

// ============================================================
// PLAYER ACTIONS
// ============================================================
function discardTile(tile) {
  if (G.phase !== 'player_draw' && G.phase !== 'discard' && G.phase !== 'draw') return;
  if (G.players[0].riichi && G.tsumoTile && tile.id !== G.tsumoTile.id) {
    showNotification('リーチ中はツモ切りのみです'); return;
  }
  const p = G.players[0];
  const fullHand = G.tsumoTile ? [...p.hand, G.tsumoTile] : [...p.hand];
  if (!fullHand.find(t => t.id === tile.id)) return;

  if (G.tsumoTile && tile.id === G.tsumoTile.id) {
    G.tsumoTile = null;
  } else {
    const handIdx = p.hand.findIndex(t => t.id === tile.id);
    p.hand.splice(handIdx, 1);
    if (G.tsumoTile) { p.hand.push(G.tsumoTile); G.tsumoTile = null; }
  }

  p.discards.push(tile);
  addLog(`あなたが ${renderTileText(tile)} を捨てた`);

  for (let i = 1; i < G.playerCount; i++) {
    const cpuHand = [...G.players[i].hand, tile];
    if (cpuHand.length === 14 && checkAgari(cpuHand) && Math.random() < 0.1) {
      handleCpuWin(i, cpuHand, 'ron'); return;
    }
  }

  G.currentTurn = 1; G.phase = 'cpu';
  updateUI();
  saveGameState();
  cpuTurn(1);
}

function declareTsumo() {
  const fullHand = getPlayerHand(0);
  const agari = checkAgari(fullHand);
  if (!agari) return;
  const p = G.players[0];
  const context = getPlayerContext(0); context.tsumo = true;
  const yaku = detectYaku(fullHand, p, context);
  if (yaku.length === 0) { showNotification('役がありません！'); return; }
  const han = yaku.reduce((s,y)=>s+y.han,0);
  const fu = calcFu(fullHand, context);
  showResultModal(fullHand, yaku, han, fu, 'ツモ', null);
  G.gameOver = true;
  const basicPts = Math.min(fu * Math.pow(2, han+2), 8000);
  const tsumoPts = Math.ceil(basicPts/100)*100;
  for (let i = 1; i < G.playerCount; i++) {
    G.players[i].score -= tsumoPts;
    p.score += tsumoPts;
  }
  addLog(`ツモ! ${han}翻${fu}符`, 'win');
  saveGameState();
}

function declareRon() { showNotification('ロン（CPU捨て後に自動判定）'); }
function declareRiichi() {
  const p = G.players[0];
  const fullHand = getPlayerHand(0);
  if (p.score < 1000) { showNotification('点数が足りません'); return; }
  const sh = calcShanten(fullHand);
  if (sh > 0) { showNotification('テンパイしていません'); return; }
  p.riichi = true; p.score -= 1000; G.riichiPot += 1000;
  addLog('リーチ！', 'riichi');
  showNotification('リーチ！');
  updateUI();
  saveGameState();
}

function declarePon() { showNotification('ポン（実装中）'); }
function declareKan() { showNotification('カン（実装中）'); }

function handleRyuukyoku() {
  G.gameOver = true;
  addLog('流局', 'system');
  showNotification('流局');

      <p style="color:rgba(232,224,208,0.7);">山牌が尽きました。</p>

        <button class="btn" onclick="newGame()">次の局へ</button>

      </div>
    </div>`);
  }, 800);
}

}

function renderSmallTile(tile, size='sm') {

function getTileById(id) {
  if (!G) return null;
  const numId = Number(id);
  const allTiles = [...G.players[0].hand, ...(G.tsumoTile ? [G.tsumoTile] : [])];

}

  if (G.phase !== 'player_draw' || G.gameOver) {
    list.innerHTML = '<div style="font-size:0.72rem;color:rgba(232,224,208,0.35);text-align:center;padding:8px;">プレイヤーのターン時に表示</div>';
    return;
  }
  const candidates = analyzeCandidates(0);
  list.innerHTML = candidates.map((c, i) => {
    const isBest = i === 0;
    const shantenText = c.shanten===-1?'<span style="color:#2ecc71">アガリ</span>':c.shanten===0?'<span style="color:#f39c12">テンパイ</span>':`${c.shanten}シャンテン`;
    const d = c.display;
    return `<div class="candidate-item ${isBest?'best':''}" onclick="highlightCandidate(${c.tile.id})">
      <div class="candidate-rank ${isBest?'best':''}">${isBest?'★':i+1}</div>
      <div><div class="tile tile-sm" style="${tileStyle(c.tile)}"></div></div>
      <div class="candidate-info">
        <div class="candidate-shanten">${shantenText}</div>
        <div class="candidate-yaku">${c.yaku.map(y=>y.name).join('・')||'役なし'}</div>
      </div>
      <button class="candidate-detail-btn" onclick="showCandidateDetail(${c.tile.id},event)">詳細</button>
      <button class="candidate-discard-btn" onclick="event.stopPropagation();discardTile(getTileById(${c.tile.id}))">捨てる</button>
    </div>`;
  }).join('');
}

function highlightCandidate(tileId) {
  document.querySelectorAll('#playerHand .tile').forEach(el => el.classList.remove('selected','candidate-best'));
  const el = document.querySelector(`#playerHand [data-id="${tileId}"]`);
  if (el) el.classList.add('selected', 'candidate-best');
}

function showModal(title, bodyHTML) {
  document.getElementById('modalTitle').textContent = title;
  document.getElementById('modalBody').innerHTML = bodyHTML;
  document.getElementById('modalOverlay').classList.remove('hidden');
}

function closeModal(event) {
  if (event && event.target !== document.getElementById('modalOverlay')) return;
  document.getElementById('modalOverlay').classList.add('hidden');
}

function showResultModal(hand, yaku, han, fu, type, loser) {
  const { basicPoints, yakuman } = calcScore(yaku, fu, han);
  const totalHan = yaku.reduce((s,y)=>s+y.han,0);
  const pts = Math.ceil(basicPoints * 4 / 100) * 100;
  let hanLabel = yakuman||totalHan>=13 ? '役満' : totalHan>=11?'三倍満':totalHan>=8?'倍満':totalHan>=6?'跳満':totalHan>=5?'満貫':`${totalHan}翻${fu}符`;
  showModal(type, `<div class="result-display">
    <div class="result-type">${type}</div>
    <div class="result-hand-display">${sortTiles(hand).map(t=>`<div class="tile tile-md" style="${tileStyle(t)}"></div>`).join('')}</div>
    <div class="result-yaku-list">${yaku.map(y=>`<div class="result-yaku-item"><span>${y.name}</span><span style="color:var(--gold)">${y.han>=13?'役満':y.han+'翻'}</span></div>`).join('')}</div>
    <div class="result-fu">${hanLabel}</div>
    <div class="result-total">+${pts.toLocaleString()}点</div>
    <div style="margin-top:18px;display:flex;gap:10px;justify-content:center;">
      <button class="btn" onclick="newGame()">次の局へ</button>
      <button class="btn" onclick="closeModal()">閉じる</button>
    </div>
  </div>`);
}

function tryFormMentsuGroups(tiles) {
  if (tiles.length === 0) return [];
  const sorted = sortTiles(tiles);
  const t = sorted[0];
  const kouIndices = [];
  for (let i = 0; i < sorted.length && kouIndices.length < 3; i++) {
    if (tileKey(sorted[i]) === tileKey(t)) kouIndices.push(i);
  }
  if (kouIndices.length >= 3) {
    const kouSet = new Set(kouIndices);
    const rest = sorted.filter((_, i) => !kouSet.has(i));
    const result = tryFormMentsuGroups(rest);
    if (result !== null) return [{ type: 'kou', tiles: kouIndices.map(i => sorted[i]) }, ...result];
  }
  if (t.suit !== 'jihai' && t.num <= 7) {
    const i1 = 0;
    const i2 = sorted.findIndex(x => x.suit === t.suit && x.num === t.num + 1);
    const i3 = sorted.findIndex(x => x.suit === t.suit && x.num === t.num + 2);
    if (i2 >= 0 && i3 >= 0) {
      const junSet = new Set([i1, i2, i3]);
      const rest = sorted.filter((_, i) => !junSet.has(i));
      const result = tryFormMentsuGroups(rest);
      if (result !== null) return [{ type: 'jun', tiles: [sorted[i1], sorted[i2], sorted[i3]] }, ...result];
    }
  }
  return null;
}

function tryDecomposeNormal(tiles) {
  const sorted = sortTiles(tiles);
  const tried = new Set();
  for (let i = 0; i < sorted.length - 1; i++) {
    const k = tileKey(sorted[i]);
    if (tried.has(k)) continue;
    tried.add(k);
    if (tileKey(sorted[i]) !== tileKey(sorted[i + 1])) continue;
    const rest = sorted.filter((_, j) => j !== i && j !== i + 1);
    const mentsu = tryFormMentsuGroups(rest);
    if (mentsu !== null) return { type: 'normal', jantai: [sorted[i], sorted[i + 1]], mentsu };
  }
  return null;
}

function renderDecomposition(decomp) {
  if (!decomp) return '';
  const tileXS = t => `<div class="tile tile-xs" style="${tileStyle(t)}"></div>`;
  if (decomp.type === 'kokushi') return '<div style="font-size:0.7rem;color:rgba(232,224,208,0.5)">国士無双</div>';
  if (decomp.type === 'chiitoitsu') {
    return `<div class="decomp-display">${decomp.pairs.map(pair =>
      `<div class="decomp-group"><div class="decomp-tiles">${pair.map(tileXS).join('')}</div><div class="decomp-group-label">対子</div></div>`
    ).join('')}</div>`;
  }
  return `<div class="decomp-display">
    <div class="decomp-group"><div class="decomp-tiles">${decomp.jantai.map(tileXS).join('')}</div><div class="decomp-group-label">雀頭</div></div>
    ${decomp.mentsu.map(m =>
      `<div class="decomp-group"><div class="decomp-tiles">${m.tiles.map(tileXS).join('')}</div><div class="decomp-group-label">${m.type === 'kou' ? '刻子' : '順子'}</div></div>`
    ).join('')}
  </div>`;
}

function showCandidateDetail(tileId, event) {
  event.stopPropagation();
  const fullHand = getPlayerHand(0);
  const tile = fullHand.find(t => t.id === Number(tileId));
  if (!tile) return;
  const remaining = fullHand.filter(t => t.id !== tile.id);
  const sh = calcShanten(remaining);
  const d = tileDisplay(tile);

  const shantenColor = sh === -1 ? '#2ecc71' : sh === 0 ? '#f39c12' : 'var(--ivory)';
  const shantenLabel = sh === -1 ? 'アガリ形' : sh === 0 ? 'テンパイ' : `${sh}シャンテン`;

  const handHTML = `<div class="detail-section">
    <div class="detail-title">捨てた後の手牌</div>
    <div class="hand-example">${sortTiles(remaining).map(t => `<div class="tile tile-sm" style="${tileStyle(t)}"></div>`).join('')}</div>
  </div>`;

  const shantenHTML = `<div class="detail-section">
    <div class="detail-title">シャンテン数</div>
    <p style="color:${shantenColor};font-size:1.1rem;font-weight:700;">${shantenLabel}</p>
  </div>`;

  let tenpaiHTML = '';

  if (sh === 0) {
    const waits = [];
    for (const suit of ['man', 'pin', 'sou']) {
      for (let n = 1; n <= 9; n++) {
        const testHand = [...remaining, { suit, num: n, id: 9999 }];
        if (checkAgari(testHand)) waits.push({ suit, num: n });
      }
    }
    for (let n = 1; n <= 7; n++) {
      const testHand = [...remaining, { suit: 'jihai', num: n, id: 9999 }];
      if (checkAgari(testHand)) waits.push({ suit: 'jihai', num: n });
    }

    if (waits.length > 0) {
      const baseCtx = getPlayerContext(0);
      const waitDetails = waits.map(w => {
        const completeHand = [...remaining, { ...w, id: 9999 }];
        const ctx = { ...baseCtx, tsumo: true };
        const yakuList = detectYaku(completeHand, G.players[0], ctx);
        const fu = calcFu(completeHand, ctx);
        const scoreInfo = calcScore(yakuList, fu, 0);
        const totalHan = yakuList.reduce((s, y) => s + y.han, 0);
        const pts = Math.ceil(scoreInfo.basicPoints * 4 / 100) * 100;
        const hanLabel = scoreInfo.yakuman ? '役満' : totalHan >= 11 ? '三倍満' : totalHan >= 8 ? '倍満' : totalHan >= 6 ? '跳満' : totalHan >= 5 ? '満貫' : totalHan > 0 ? `${totalHan}翻${fu}符` : '';
        const sorted14 = sortTiles(completeHand);
        const decomp = isChiitoitsu(sorted14) ? (() => {
          const seen = {}; for (const t of sorted14) { const k = tileKey(t); if (!seen[k]) seen[k] = []; seen[k].push(t); }
          return { type: 'chiitoitsu', pairs: Object.values(seen) };
        })() : isKokushi(sorted14) ? { type: 'kokushi' } : tryDecomposeNormal(completeHand);
        const wd = tileDisplay(w);
        return { tile: w, display: wd, yakuList, fu, totalHan, pts, hanLabel, decomp };
      });

      tenpaiHTML = `<div class="detail-section">
        <div class="detail-title">待ち牌と上がり分析（ツモ）</div>
        <div class="wait-analysis">${waitDetails.map(wd => `
          <div class="wait-analysis-item">
            <div class="wait-analysis-header">
              <div class="tile tile-sm" style="${tileStyle(wd.tile)}"></div>
              <div class="wait-analysis-score">
                ${wd.yakuList.length > 0
                  ? `<span class="wait-han-label">${wd.hanLabel}</span><span class="wait-pts">+${wd.pts.toLocaleString()}点</span>`
                  : '<span class="wait-no-yaku">役なし（アガれません）</span>'}
              </div>
            </div>
            ${wd.yakuList.length > 0
              ? `<div class="wait-yaku-list">${wd.yakuList.map(y => `<span class="wait-yaku-tag">${y.name}（${y.han >= 13 ? '役満' : y.han + '翻'}）</span>`).join('')}</div>`
              : ''}
            ${renderDecomposition(wd.decomp)}
          </div>`).join('')}
        </div>
      </div>`;
    }
  }

  showModal(`捨て牌分析: ${d.text}`, handHTML + shantenHTML + tenpaiHTML);
}

// ============================================================
// NOTIFICATIONS & LOG
// ============================================================
let notifTimeout;
function showNotification(msg) {
  const existing = document.querySelector('.notification');
  if (existing) existing.remove();
  if (notifTimeout) clearTimeout(notifTimeout);
  const el = document.createElement('div');
  el.className = 'notification'; el.textContent = msg;
  document.body.appendChild(el);
  notifTimeout = setTimeout(() => el.remove(), 3000);
}

function addLog(msg, type='normal') {
  const log = document.getElementById('gameLog');
  const item = document.createElement('div');
  item.className = `log-item ${type}`; item.textContent = msg;
  log.insertBefore(item, log.firstChild);
  if (log.children.length > 30) log.lastChild.remove();
}

// ============================================================
// GAME CONTROL
// ============================================================
function setGameType(type) {
  gameType = type;
  document.getElementById('s-4ma').classList.toggle('active', type===4);
  document.getElementById('s-3ma').classList.toggle('active', type===3);
  try { localStorage.setItem('mahjong_gametype', type); } catch(e) {}
  newGame();
}

function newGame() {
  document.getElementById('gameLog').innerHTML = '';
  initGame();
  updateUI();
  addLog('ゲーム開始', 'system');
  updateUI();
}

// ============================================================
// INIT
// ============================================================
window.addEventListener('load', () => {
  // Try to restore saved layout preference
  let savedLayout = null;
  try {
    savedLayout = localStorage.getItem('mahjong_layout');
    const savedType = localStorage.getItem('mahjong_gametype');
    if (savedType) gameType = parseInt(savedType);
    const savedCpu = localStorage.getItem('mahjong_cpu');
    if (savedCpu) document.getElementById('cpuAlgo').value = savedCpu;
  } catch(e) {}

  // Check if we can restore a game
  const restoredLayout = loadGameState();

  if (savedLayout || restoredLayout) {
    const layout = restoredLayout || savedLayout;
    // Show layout selector briefly then auto-select
    if (restoredLayout) {
      // Restore the saved game
      selectLayout(layout);
      updateUI();
      showNotification('前回のゲームを復元しました');
    } else {
      // Just remember layout preference but still show selector
      // (pre-highlight the saved choice)
    }
  }
});
